<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐰</text></svg>">
<title>🐰 Bunnies! — Family Game Tracker</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #fdf6ec;
  --primary: #d4654a;
  --primary-light: #e8957f;
  --secondary: #6fa882;
  --accent: #f0c060;
  --text: #2c2f4a;
  --text-light: #777;
  --card: #fff;
  --border: #e0cfc0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.app-header {
  background: linear-gradient(135deg, #d4654a 0%, #a83f28 100%);
  color: #fff;
  padding: 2rem;
  text-align: center;
}
.app-header h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
.app-header p { margin-top: 0.4rem; opacity: 0.85; font-size: 1rem; }

/* ── Nav ── */
.app-nav {
  background: #fff;
  border-bottom: 2px solid var(--border);
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.app-nav button {
  padding: 0.8rem 1.2rem;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-light);
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  font-weight: 500;
}
.app-nav button:hover { background: var(--bg); color: var(--text); }
.app-nav button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

/* ── Main ── */
.app-main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.tab { display: none; }
.tab.active { display: block; }

/* ── Cards ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.card h2 {
  font-size: 1.2rem;
  color: var(--primary);
  margin-bottom: 1rem;
}

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
@media (max-width: 700px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 0.35rem;
  padding: 0.5rem 1rem; border: none; border-radius: 8px;
  cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #b84a32; }
.btn-secondary { background: var(--secondary); color: #fff; }
.btn-secondary:hover { background: #5a9170; }
.btn-ghost { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
.btn-ghost:hover { background: var(--primary); color: #fff; }
.btn-danger { background: #e53e3e; color: #fff; }
.btn-danger:hover { background: #c53030; }
.btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

/* ── Inputs ── */
input[type="text"], input[type="month"], select {
  padding: 0.5rem 0.85rem;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.95rem;
  color: var(--text);
  background: #fff;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { border-color: var(--primary); }

/* ── Month selector row ── */
.month-selector { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.month-selector label { font-weight: 600; }

/* ── Tournament Matrix ── */
.matrix-scroll { overflow-x: auto; }
table.t-matrix { border-collapse: collapse; margin: 0 auto; font-size: 0.85rem; }
.t-matrix th, .t-matrix td {
  width: 72px; height: 56px;
  text-align: center; vertical-align: middle;
  border: 1px solid var(--border);
  transition: background 0.15s;
}
.t-matrix .player-label {
  background: #f5f5f5; font-weight: 700; font-size: 0.78rem;
  max-width: 72px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0.25rem;
}
.t-matrix td.self { background: #e0e0e0; }
.t-matrix td.cell-win  { background: #c6efce; color: #276221; cursor: pointer; font-weight: 700; font-size: 1.3rem; }
.t-matrix td.cell-win:hover  { background: #a0d9ae; }
.t-matrix td.cell-loss { background: #ffc7ce; color: #9c0006; cursor: pointer; font-size: 0.75rem; }
.t-matrix td.cell-loss:hover { background: #f0a8b0; }
.t-matrix td.cell-empty { background: #fff; cursor: pointer; color: #ccc; font-size: 1.1rem; }
.t-matrix td.cell-empty:hover { background: #f5f0ea; color: #aaa; }
.matrix-legend { display: flex; gap: 1rem; justify-content: center; margin-top: 0.75rem; flex-wrap: wrap; font-size: 0.8rem; }
.legend-item { display: flex; align-items: center; gap: 0.35rem; }
.legend-box { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ccc; }

/* ── Player chips ── */
.player-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
.player-chip {
  display: inline-flex; align-items: center; gap: 0.4rem;
  background: var(--accent); color: var(--text);
  padding: 0.35rem 0.75rem; border-radius: 20px;
  font-size: 0.85rem; font-weight: 600;
}
.player-chip button {
  background: none; border: none; cursor: pointer; color: var(--text);
  font-size: 1rem; padding: 0; line-height: 1; opacity: 0.55;
}
.player-chip button:hover { opacity: 1; color: #e53e3e; }

/* ── Stat boxes ── */
.stat-box { text-align: center; padding: 1rem; background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); }
.stat-box .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
.stat-box .stat-label { font-size: 0.78rem; color: var(--text-light); margin-top: 0.2rem; }

/* ── Winner badge ── */
.winner-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: #fff; padding: 0.5rem 1.2rem; border-radius: 25px;
  font-weight: 700; font-size: 1.1rem;
  box-shadow: 0 3px 10px rgba(253,160,133,0.4);
}

/* ── Graph container ── */
.graph-wrap {
  width: 100%; height: 480px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: #fafafa; overflow: hidden; position: relative;
}
.graph-wrap svg { width: 100%; height: 100%; }

/* ── Concept cards ── */
.concept-card {
  border-left: 4px solid var(--primary);
  padding: 0.9rem 1.1rem; background: #fff8f5;
  border-radius: 0 8px 8px 0; margin-bottom: 1rem;
}
.concept-card h4 { color: var(--primary); margin-bottom: 0.35rem; font-size: 0.95rem; }
.concept-card p { font-size: 0.88rem; line-height: 1.65; color: var(--text-light); }

/* ── Rank list ── */
.rank-list { list-style: none; }
.rank-list li {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.6rem 0.75rem; border-radius: 8px;
  margin-bottom: 0.35rem; background: var(--bg); font-weight: 600;
}
.rank-num {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.82rem; flex-shrink: 0;
}
.rank-1 { background: #ffd700; color: #6a4800; }
.rank-2 { background: #c0c0c0; color: #444; }
.rank-3 { background: #cd7f32; color: #fff; }
.rank-n { background: var(--border); color: var(--text-light); }

/* ── Leaderboard table ── */
.lb-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
.lb-table th {
  text-align: left; padding: 0.55rem 0.75rem;
  background: var(--bg); border-bottom: 2px solid var(--border);
  font-weight: 700; color: var(--text-light);
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
}
.lb-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--border); }
.lb-table tr:hover td { background: var(--bg); }

/* ── SCC chips ── */
.scc-chip {
  display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
  font-size: 0.75rem; font-weight: 700; margin: 0.15rem; color: #fff;
}

/* ── Hamiltonian path ── */
.ham-path { display: flex; align-items: center; flex-wrap: wrap; gap: 0; margin: 1rem 0; }
.ham-node { display: flex; flex-direction: column; align-items: center; }
.ham-circle {
  width: 64px; height: 64px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 0.78rem; color: #fff;
  text-align: center; padding: 4px; word-break: break-word;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.ham-arrow { font-size: 1.5rem; color: var(--text-light); padding: 0 0.2rem; align-self: center; margin-bottom: 22px; }
.ham-rank { font-size: 0.72rem; color: var(--text-light); margin-top: 0.3rem; font-weight: 700; }

/* ── Month history ── */
.month-history { list-style: none; }
.month-history li {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.6rem 0.75rem; border-radius: 8px; margin-bottom: 0.35rem;
  background: var(--bg); cursor: pointer; transition: background 0.15s;
}
.month-history li:hover { background: #ecddc8; }
.month-history .mh-month { font-weight: 700; }
.month-history .mh-winner { color: var(--primary); font-weight: 600; }
.month-history .mh-edges { color: var(--text-light); font-size: 0.78rem; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
.empty-state .ei { font-size: 3rem; margin-bottom: 1rem; }
.empty-state p { font-size: 0.95rem; line-height: 1.6; }

/* ── Degree bar chart ── */
.bar-chart { display: flex; align-items: flex-end; gap: 10px; height: 140px; padding-top: 12px; }
.bar-group { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 40px; }
.bar-stack { display: flex; gap: 3px; align-items: flex-end; }
.bar-out { background: var(--secondary); border-radius: 4px 4px 0 0; width: 18px; transition: height 0.5s; }
.bar-in  { background: var(--primary-light); border-radius: 4px 4px 0 0; width: 18px; transition: height 0.5s; }
.bar-label { font-size: 0.7rem; margin-top: 5px; text-align: center; max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.chart-legend { display: flex; gap: 1rem; justify-content: center; margin-top: 0.5rem; font-size: 0.8rem; }
.chart-legend-item { display: flex; align-items: center; gap: 0.35rem; }
.dot { width: 10px; height: 10px; border-radius: 50%; }

/* ── Tooltip ── */
.tooltip {
  position: fixed; background: rgba(30,32,55,0.93); color: #fff;
  padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.8rem;
  pointer-events: none; z-index: 9999; max-width: 200px;
  line-height: 1.5; display: none;
}

/* ── Elo line chart ── */
.elo-wrap { width: 100%; height: 300px; }
.elo-wrap svg { overflow: visible; }
.elo-line { fill: none; stroke-width: 2.5; }
.elo-dot { r: 4; stroke: #fff; stroke-width: 2; cursor: pointer; }
.elo-legend { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.75rem; }
.elo-legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; font-weight: 600; }
.elo-legend-swatch { width: 20px; height: 4px; border-radius: 2px; }

/* ── Cyclic triple chips ── */
.cycle-chip {
  display: inline-flex; align-items: center; gap: 0.3rem;
  background: #fff3e0; border: 1.5px solid #ffcc80;
  border-radius: 20px; padding: 0.3rem 0.75rem;
  font-size: 0.82rem; font-weight: 600; color: #7b4a00; margin: 0.2rem;
}

/* ── Prestige compare table ── */
.rank-compare { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 500px) { .rank-compare { grid-template-columns: 1fr; } }

/* ── Conflict items ── */
.conflict-item {
  border: 1.5px solid var(--border); border-radius: 10px;
  margin-bottom: 0.85rem; overflow: hidden;
}
.conflict-header {
  background: var(--bg); padding: 0.5rem 0.85rem;
  font-size: 0.78rem; font-weight: 700; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.conflict-pair { font-size: 0.95rem; font-weight: 700; color: var(--text); padding: 0 0.85rem 0.25rem; }
.conflict-options { display: flex; }
.conflict-opt {
  flex: 1; padding: 0.65rem 0.85rem; cursor: pointer;
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.88rem; transition: background 0.15s; border-top: 1px solid var(--border);
}
.conflict-opt:first-child { border-right: 1px solid var(--border); }
.conflict-opt input[type=radio] { accent-color: var(--primary); }
.conflict-opt.opt-mine   { background: #f0faf4; }
.conflict-opt.opt-theirs { background: #fff8f0; }
.conflict-opt:hover { filter: brightness(0.96); }

/* ── Win-rate bar ── */
.wr-bar { display: flex; align-items: center; gap: 0.5rem; }
.wr-track { width: 64px; height: 7px; background: #eee; border-radius: 4px; overflow: hidden; }
.wr-fill  { height: 100%; background: var(--secondary); border-radius: 4px; }
</style>
</head>
<body>

<header class="app-header">
  <h1>🐰 Bunnies!</h1>
  <p>Family tournament tracker &amp; graph theory playground</p>
</header>

<nav class="app-nav" id="app-nav">
  <button>🏠 Home</button>
  <button>📝 Record</button>
  <button>🕸️ Graph</button>
  <button>🧮 Theory</button>
  <button>🏆 Leaderboard</button>
  <button>👥 Players</button>
</nav>

<div class="tooltip" id="tooltip"></div>

<!-- Merge conflict modal -->
<div id="merge-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;overflow-y:auto;padding:2rem 1rem;">
  <div style="max-width:620px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,0.25);overflow:hidden;">
    <div style="background:linear-gradient(135deg,var(--primary),#b84a32);color:#fff;padding:1.25rem 1.5rem;">
      <h2 style="font-size:1.2rem;margin:0;">🔀 Merge Conflicts</h2>
      <p id="merge-modal-subtitle" style="margin:0.3rem 0 0;opacity:0.88;font-size:0.88rem;"></p>
    </div>
    <div id="merge-modal-body" style="padding:1.5rem;max-height:60vh;overflow-y:auto;"></div>
    <div style="padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:0.75rem;justify-content:flex-end;background:#fafafa;">
      <button class="btn btn-ghost" onclick="closeMergeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applyMerge()">✓ Apply Merge</button>
    </div>
  </div>
</div>

<main class="app-main">
  <div id="tab-home"        class="tab active"></div>
  <div id="tab-record"      class="tab"></div>
  <div id="tab-graph"       class="tab"></div>
  <div id="tab-theory"      class="tab"></div>
  <div id="tab-leaderboard" class="tab"></div>
  <div id="tab-players"     class="tab"></div>
</main>

<script>
// ═══════════════════════════════════════════════════════
// STATE & PERSISTENCE
// ═══════════════════════════════════════════════════════

const STORAGE_KEY = 'bunnies-game-v1';

let state = { players: [], months: {} };

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
    else initDemo();
  } catch(e) { initDemo(); }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function initDemo() {
  state = {
    players: ['Mom', 'Dad', 'Alice', 'Bob'],
    months: {
      '2025-01': { edges: [
        {from:'Mom',   to:'Dad'},   {from:'Mom',  to:'Alice'},
        {from:'Bob',   to:'Mom'},   {from:'Alice',to:'Bob'},
        {from:'Dad',   to:'Alice'}, {from:'Bob',  to:'Dad'}
      ]},
      '2025-02': { edges: [
        {from:'Alice', to:'Mom'},   {from:'Alice',to:'Dad'},
        {from:'Alice', to:'Bob'},   {from:'Mom',  to:'Bob'},
        {from:'Mom',   to:'Dad'},   {from:'Bob',  to:'Dad'}
      ]},
      '2025-03': { edges: [
        {from:'Dad',   to:'Mom'},   {from:'Dad',  to:'Alice'},
        {from:'Dad',   to:'Bob'},   {from:'Alice',to:'Mom'},
        {from:'Bob',   to:'Mom'},   {from:'Alice',to:'Bob'}
      ]}
    }
  };
  saveState();
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════

function fmtMonth(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return new Date(+y, +mo - 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}

function nowMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function allMonths() {
  return Object.keys(state.months).sort().reverse();
}

function edges(month) { return (state.months[month] || {}).edges || []; }

function edgeBetween(month, a, b) {
  if (edges(month).some(e => e.from === a && e.to === b)) return a;
  if (edges(month).some(e => e.from === b && e.to === a)) return b;
  return null;
}

function setEdge(month, winner, loser) {
  if (!state.months[month]) state.months[month] = { edges: [] };
  state.months[month].edges = state.months[month].edges.filter(
    e => !((e.from===winner&&e.to===loser)||(e.from===loser&&e.to===winner))
  );
  state.months[month].edges.push({ from: winner, to: loser });
  saveState();
}

function clearEdge(month, a, b) {
  if (!state.months[month]) return;
  state.months[month].edges = state.months[month].edges.filter(
    e => !((e.from===a&&e.to===b)||(e.from===b&&e.to===a))
  );
  saveState();
}

function outDeg(month, p) { return edges(month).filter(e => e.from === p).length; }
function inDeg(month, p)  { return edges(month).filter(e => e.to   === p).length; }

function monthWinner(month) {
  if (!state.players.length) return null;
  const es = edges(month);
  if (!es.length) return null;
  let best = null, bestScore = -1;
  for (const p of state.players) {
    const s = es.filter(e => e.from === p).length;
    if (s > bestScore) { bestScore = s; best = p; }
  }
  return bestScore > 0 ? best : null;
}

function winColor(wins, max) {
  if (max <= 0) return '#aaa';
  const t = wins / max;
  // red → orange → yellow → light-green → green
  const stops = ['#e57373','#ffb74d','#fff176','#aed581','#4caf50'];
  const pos = t * (stops.length - 1);
  const lo = Math.min(Math.floor(pos), stops.length - 2);
  return d3.interpolateRgb(stops[lo], stops[lo+1])(pos - lo);
}

// ═══════════════════════════════════════════════════════
// GRAPH ALGORITHMS
// ═══════════════════════════════════════════════════════

function findSCCs(players, es) {
  if (!players.length) return [];
  const adj = {}, radj = {};
  players.forEach(p => { adj[p] = []; radj[p] = []; });
  es.forEach(e => {
    if (adj[e.from]) adj[e.from].push(e.to);
    if (radj[e.to])  radj[e.to].push(e.from);
  });

  const visited1 = new Set(), order = [];
  function dfs1(v) {
    visited1.add(v);
    for (const u of adj[v]) if (!visited1.has(u)) dfs1(u);
    order.push(v);
  }
  players.forEach(p => { if (!visited1.has(p)) dfs1(p); });

  const visited2 = new Set(), sccs = [];
  function dfs2(v, comp) {
    visited2.add(v); comp.push(v);
    for (const u of radj[v]) if (!visited2.has(u)) dfs2(u, comp);
  }
  for (let i = order.length - 1; i >= 0; i--) {
    const v = order[i];
    if (!visited2.has(v)) { const c = []; dfs2(v, c); sccs.push(c); }
  }
  return sccs;
}

function topoSort(players, es) {
  const inDeg = {};
  players.forEach(p => inDeg[p] = 0);
  es.forEach(e => { if (inDeg[e.to] !== undefined) inDeg[e.to]++; });
  const queue = players.filter(p => inDeg[p] === 0), result = [];
  while (queue.length) {
    const v = queue.shift(); result.push(v);
    es.filter(e => e.from === v).forEach(e => {
      if (inDeg[e.to] !== undefined) { inDeg[e.to]--; if (inDeg[e.to]===0) queue.push(e.to); }
    });
  }
  return result.length === players.length ? result : null;
}

function hamiltonianPath(players, es) {
  if (!players.length) return [];
  const edgeSet = new Set(es.map(e => `${e.from}::${e.to}`));
  const beats = (a, b) => edgeSet.has(`${a}::${b}`);
  const path = [players[0]];
  for (let i = 1; i < players.length; i++) {
    const v = players[i]; let inserted = false;
    for (let j = 0; j < path.length; j++) {
      if (beats(v, path[j])) { path.splice(j, 0, v); inserted = true; break; }
    }
    if (!inserted) path.push(v);
  }
  return path;
}

function findKings(players, es) {
  const edgeSet = new Set(es.map(e => `${e.from}::${e.to}`));
  const beats = (a, b) => edgeSet.has(`${a}::${b}`);
  return players.filter(p =>
    players.every(q => q === p || beats(p, q) ||
      players.some(mid => mid!==p && mid!==q && beats(p,mid) && beats(mid,q))
    )
  );
}

function refreshMatrix() {
  const month = document.getElementById('rec-month').value;
  const area  = document.getElementById('matrix-area');
  const ps    = state.players;

  if (!ps.length) {
    area.innerHTML = `<div class="empty-state"><div class="ei">👥</div><p>Add players in the Players tab first.</p></div>`;
    return;
  }
  if (!month) { area.innerHTML = `<p style="color:var(--text-light)">Select a month above.</p>`; return; }

  const totalPairs = ps.length * (ps.length - 1) / 2;
  const recorded   = edges(month).length;
  const winner     = monthWinner(month);

  let html = `<div class="matrix-scroll"><table class="t-matrix">
    <tr><th class="player-label" style="background:#eee;">↓ said it to →</th>
    ${ps.map(p=>`<th class="player-label" title="${p}">${p}</th>`).join('')}</tr>`;

  ps.forEach(row => {
    html += `<tr><th class="player-label" title="${row}">${row}</th>`;
    ps.forEach(col => {
      if (row === col) { html += `<td class="self">—</td>`; return; }
      const w = edgeBetween(month, row, col);
      if (w === row)
        html += `<td class="cell-win"  title="${row} said Bunnies! to ${col} first" onclick="cycleCell('${month}','${row}','${col}')">🐰</td>`;
      else if (w === col)
        html += `<td class="cell-loss" title="${col} said Bunnies! to ${row} first" onclick="cycleCell('${month}','${row}','${col}')">✗</td>`;
      else
        html += `<td class="cell-empty" title="Click: ${row} said Bunnies! to ${col} first" onclick="cycleCell('${month}','${row}','${col}')">·</td>`;
    });
    html += `</tr>`;
  });
  html += `</table></div>`;

  html += `
    <div class="matrix-legend">
      <div class="legend-item"><div class="legend-box" style="background:#c6efce;"></div> Row player won 🐰</div>
      <div class="legend-item"><div class="legend-box" style="background:#ffc7ce;"></div> Column player won</div>
      <div class="legend-item"><div class="legend-box" style="background:#fff;border-color:#ddd;"></div> Not recorded</div>
    </div>
    <p style="text-align:center;margin-top:0.85rem;color:var(--text-light);font-size:0.88rem;">
      ${recorded} / ${totalPairs} matchups recorded
      ${recorded===totalPairs&&totalPairs>0 ? ` &nbsp;·&nbsp; 🏆 Winner: <strong style="color:var(--primary)">${winner}</strong>` : ''}
    </p>`;

  area.innerHTML = html;
}

function cycleCell(month, row, col) {
  const cur = edgeBetween(month, row, col);
  if (cur === null)  setEdge(month, row, col);
  else if (cur===row) setEdge(month, col, row);
  else               clearEdge(month, row, col);
  refreshMatrix();
}

// ═══════════════════════════════════════════════════════
// D3 FORCE GRAPH (reusable)
// ═══════════════════════════════════════════════════════

let _simMap = {};  // keyed by container id — stop old sims

function renderForceGraph(container, players, es, colorFn, monthKey) {
  const id = container.id || 'graph';
  if (_simMap[id]) { _simMap[id].stop(); delete _simMap[id]; }

  const W = container.clientWidth  || 700;
  const H = container.clientHeight || 480;
  const R = 26;

  d3.select(container).selectAll('*').remove();

  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g   = svg.append('g');

  svg.call(d3.zoom().scaleExtent([0.25, 4]).on('zoom', ev => g.attr('transform', ev.transform)));

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id', `arr-${id}`).attr('viewBox','0 -5 10 10')
    .attr('refX', 10).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','#888');

  const nodes = players.map(p => ({ id: p }));
  const links = es.map(e => ({ source: e.from, target: e.to }));

  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(links).id(d=>d.id).distance(130))
    .force('charge',  d3.forceManyBody().strength(-420))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(R + 14));

  _simMap[id] = sim;

  const linkSel = g.selectAll('.lnk').data(links).enter()
    .append('line').attr('class','lnk')
    .attr('stroke','#bbb').attr('stroke-width', 2.2)
    .attr('marker-end', `url(#arr-${id})`);

  const wins = {};
  players.forEach(p => wins[p] = monthKey ? outDeg(monthKey, p) : 0);

  const nodeSel = g.selectAll('.nd').data(nodes).enter()
    .append('g').attr('class','nd')
    .call(d3.drag()
      .on('start', (ev,d) => { if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (ev,d) => { d.fx=ev.x; d.fy=ev.y; })
      .on('end',   (ev,d) => { if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', (ev, d) => {
      const w = monthKey ? outDeg(monthKey, d.id) : 0;
      const l = monthKey ? inDeg(monthKey, d.id)  : 0;
      showTip(ev, `<strong>${d.id}</strong><br>🐰 Wins: ${w}<br>Losses: ${l}`);
    })
    .on('mousemove', moveTip)
    .on('mouseout',  hideTip);

  const maxWins = Math.max(...players.map(p => wins[p]), 1);

  nodeSel.append('circle')
    .attr('r',      d => R + wins[d.id] * 3)
    .attr('fill',   d => colorFn(d.id))
    .attr('stroke', '#fff').attr('stroke-width', 3)
    .style('filter','drop-shadow(1px 3px 4px rgba(0,0,0,0.18))');

  nodeSel.append('text')
    .text(d => d.id.length > 8 ? d.id.slice(0,7)+'…' : d.id)
    .attr('text-anchor','middle').attr('dominant-baseline','middle')
    .attr('font-size','12px').attr('font-weight','700')
    .attr('fill','#fff').attr('pointer-events','none');

  nodeSel.append('text')
    .text(d => wins[d.id] > 0 ? `${wins[d.id]}W` : '')
    .attr('text-anchor','middle')
    .attr('y', d => R + wins[d.id]*3 + 14)
    .attr('font-size','10px').attr('fill','var(--text-light)')
    .attr('pointer-events','none');

  sim.on('tick', () => {
    // Clamp positions in-place so edges and nodes always agree
    nodes.forEach(d => {
      const nr = R + wins[d.id] * 3 + 10;
      d.x = Math.max(nr, Math.min(W - nr, d.x));
      d.y = Math.max(nr, Math.min(H - nr, d.y));
    });
    linkSel.each(function(d) {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const len = Math.hypot(dx, dy) || 1;
      const tr  = R + wins[d.target.id] * 3 + 10;
      d3.select(this)
        .attr('x1', d.source.x).attr('y1', d.source.y)
        .attr('x2', d.target.x - dx/len*tr)
        .attr('y2', d.target.y - dy/len*tr);
    });
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

const SCC_COLORS = d3.schemeTableau10;

function buildTheory() {
  const month = gTheoryMonth;
  const sec   = document.getElementById('theory-sections');

  if (!state.players.length || !month) {
    sec.innerHTML = `<div class="card"><div class="empty-state"><div class="ei">🧮</div>
      <p>Add players and record some games to explore graph theory!</p></div></div>`;
    return;
  }

  const ps   = state.players;
  const es   = edges(month);
  const sccs = findSCCs(ps, es);
  const topo = topoSort(ps, es);
  const ham  = hamiltonianPath(ps, es);
  const kings = findKings(ps, es);

  const playerSCC  = {};
  const playerColor = {};
  sccs.forEach((comp, i) => comp.forEach(p => {
    playerSCC[p]   = i;
    playerColor[p] = SCC_COLORS[i % SCC_COLORS.length];
  }));

  const maxOut = Math.max(...ps.map(p => outDeg(month,p)), 1);

  let html = `
  <!-- 1: Tournament -->
  <div class="card">
    <h2>🏟️ What is a Tournament Graph?</h2>
    <div class="concept-card">
      <h4>Every pair of players has exactly one directed edge</h4>
      <p>In Bunnies!, for every pair of family members, exactly one person says "Bunnies!" first.
         This creates a <strong>tournament graph</strong> — a complete directed graph where for
         every pair (A, B) there is either an edge A→B or B→A, never both, never neither.
         With ${ps.length} players there are <strong>${ps.length*(ps.length-1)/2} possible matchups</strong>
         and ${es.length} have been recorded this month.</p>
    </div>
    <div class="graph-wrap" id="th-graph-main" style="height:380px;"></div>
  </div>

  <!-- 2: Degree -->
  <div class="card">
    <h2>📊 Degree Analysis</h2>
    <div class="concept-card">
      <h4>In-degree vs Out-degree</h4>
      <p><strong>Out-degree</strong> = how many people you said "Bunnies!" to first (your wins).
         <strong>In-degree</strong> = how many people said it to you first (your losses).
         In a complete tournament on n players, every player's in-degree + out-degree = n − 1 = ${ps.length-1}.</p>
    </div>
    <div id="th-degree-chart"></div>
  </div>

  <!-- 3: SCC -->
  <div class="card">
    <h2>🔁 Strongly Connected Components</h2>
    <div class="concept-card">
      <h4>Who can "reach" whom transitively?</h4>
      <p>A <strong>strongly connected component (SCC)</strong> is a maximal set of players where
         you can follow directed edges to get from anyone to anyone else.
         In Bunnies! terms: within an SCC, every player can claim a transitive chain of "Bunnies!" wins back
         to every other player — they're true rivals with no clear pecking order.</p>
    </div>
    <p style="margin-bottom:0.75rem;font-size:0.9rem;">
      Found <strong>${sccs.length}</strong> SCC${sccs.length!==1?'s':''} in ${fmtMonth(month)}:
    </p>
    ${sccs.map((comp,i) => `
      <div style="margin-bottom:0.5rem;">
        <span style="font-weight:700;color:${SCC_COLORS[i%SCC_COLORS.length]}">${comp.length>1?'🔁':'·'} Group ${i+1}:</span>
        ${comp.map(p=>`<span class="scc-chip" style="background:${SCC_COLORS[i%SCC_COLORS.length]}">${p}</span>`).join('')}
        ${comp.length>1 ? '<span style="color:var(--text-light);font-size:0.8rem;"> — a cycle of rivals!</span>' : ''}
      </div>`).join('')}
    ${sccs.length===1 ? `<p style="color:var(--text-light);font-size:0.88rem;margin-top:0.5rem;">Everyone is in one giant cycle — very common in real tournaments!</p>` : ''}
    <div class="graph-wrap" id="th-graph-scc" style="height:340px;margin-top:1rem;"></div>
    <p style="font-size:0.8rem;color:var(--text-light);margin-top:0.5rem;">Node colors represent SCC membership.</p>
  </div>

  <!-- 4: Topo Sort -->
  <div class="card">
    <h2>⬇️ Topological Sort</h2>
    <div class="concept-card">
      <h4>Ordering vertices so all edges point "downward"</h4>
      <p>A <strong>topological sort</strong> orders players so that if A beat B (A→B), then A comes before B.
         This is only possible when the graph is a <strong>DAG</strong> (directed acyclic graph — no cycles).
         If any group of players forms a cycle (all in one SCC), a true topological sort is impossible.</p>
    </div>
    ${topo ? `
      <p style="color:var(--secondary);font-weight:600;margin-bottom:0.75rem;">✓ No cycles — a perfect topological ordering exists!</p>
      <ul class="rank-list">
        ${topo.map((p,i) => `<li>
          <span class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</span>
          <span>${p}</span>
          <span style="margin-left:auto;color:var(--text-light);font-size:0.85rem;">${outDeg(month,p)} wins</span>
        </li>`).join('')}
      </ul>
    ` : `
      <p style="color:var(--primary);font-weight:600;margin-bottom:0.5rem;">✗ Cycles detected — pure topological sort is impossible.</p>
      <p style="color:var(--text-light);font-size:0.88rem;">
        The ${sccs.length} SCC${sccs.length!==1?'s':''} can themselves be topologically sorted
        (that's called the <em>condensation DAG</em>), but within each SCC the players are
        too evenly matched for a strict linear order. Use the Hamiltonian path below for ranking instead.
      </p>
    `}
  </div>

  <!-- 5: Hamiltonian Path -->
  <div class="card">
    <h2>🛤️ Hamiltonian Path — The Ranking</h2>
    <div class="concept-card">
      <h4>Every tournament has a Hamiltonian path</h4>
      <p>A <strong>Hamiltonian path</strong> visits every player exactly once following directed edges.
         A beautiful theorem states that <em>every tournament graph contains at least one Hamiltonian path</em>.
         This gives us a natural ranking — even when there are cycles, we can still order everyone!</p>
    </div>
    <div class="ham-path" id="th-ham-path"></div>
    <p style="font-size:0.82rem;color:var(--text-light);">
      The path may not be unique when players are closely matched.
      ${!topo ? 'Because of cycles, earlier players do <em>not</em> necessarily beat all later players directly.' : ''}
    </p>
  </div>

  <!-- 6: King -->
  <div class="card">
    <h2>👑 Tournament King${kings.length!==1?'s':''}</h2>
    <div class="concept-card">
      <h4>Dominating in at most 2 hops</h4>
      <p>A <strong>king</strong> in a tournament is a player who can beat every other player either
         <em>directly</em> or through exactly <em>one intermediate player</em>.
         Remarkably, the player with the highest out-degree is always a king —
         so the most-wins player is guaranteed to be royalty!</p>
    </div>
    ${kings.length ? `
      <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:0.5rem;">
        ${kings.map(k=>`<span class="winner-badge" style="font-size:1rem;">👑 ${k}</span>`).join('')}
      </div>
      ${kings.length>1 ? `<p style="color:var(--text-light);font-size:0.85rem;margin-top:0.75rem;">Multiple kings — this happens when top players are equally matched!</p>` : ''}
    ` : `<p style="color:var(--text-light);">Not enough data yet.</p>`}
  </div>`;

  // ── 7: Cyclic Triples ──────────────────────────────────
  const cycles      = findCyclicTriples(ps, es);
  const totalTri    = Math.max(ps.length*(ps.length-1)*(ps.length-2)/6, 1);
  const chaosScore  = es.length === ps.length*(ps.length-1)/2
    ? Math.round(cycles.length / totalTri * 100) : null;

  html += `
  <div class="card">
    <h2>🔺 Cyclic Triples</h2>
    <div class="concept-card">
      <h4>Rock-paper-scissors inside the tournament</h4>
      <p>A <strong>cyclic triple</strong> is a group of three players where A beat B, B beat C,
         and C beat A — a perfect rock-paper-scissors loop. The more cycles, the more chaotic
         the month. A fully transitive tournament (no cycles at all) would have a clean linear ranking.
         Formula: <em>cyclic triples = C(n,3) − Σ C(wins_i, 2)</em>.</p>
    </div>
    ${es.length < ps.length*(ps.length-1)/2 ? `
      <p style="color:var(--text-light);font-size:0.88rem;">Complete the month's matchups to see the full cycle count.</p>
    ` : `
      <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
        <div class="stat-box" style="flex:1;min-width:120px;">
          <div class="stat-num">${cycles.length}</div>
          <div class="stat-label">Cyclic triple${cycles.length!==1?'s':''}</div>
        </div>
        <div class="stat-box" style="flex:1;min-width:120px;">
          <div class="stat-num">${Math.round(totalTri) - cycles.length}</div>
          <div class="stat-label">Transitive triple${(Math.round(totalTri)-cycles.length)!==1?'s':''}</div>
        </div>
        <div class="stat-box" style="flex:1;min-width:120px;">
          <div class="stat-num">${chaosScore}%</div>
          <div class="stat-label">Chaos score</div>
        </div>
      </div>
      ${cycles.length === 0 ? `
        <p style="color:var(--secondary);font-weight:600;">✓ Zero cycles — this month has a perfect linear ranking!</p>
      ` : `
        <p style="font-size:0.88rem;font-weight:600;margin-bottom:0.5rem;">All ${cycles.length} cycle${cycles.length!==1?'s':''}:</p>
        <div style="display:flex;flex-wrap:wrap;">
          ${cycles.map(([a,b,c]) =>
            `<span class="cycle-chip">${a} → ${b} → ${c} → ${a}</span>`
          ).join('')}
        </div>
      `}
    `}
  </div>`;

  // ── 8: Prestige / PageRank ─────────────────────────────
  const prestige       = prestigeRank(ps, es);
  const rawRanked      = [...ps].sort((a,b) => outDeg(month,b) - outDeg(month,a));
  const prestigeRanked = [...ps].sort((a,b) => prestige[b] - prestige[a]);
  const maxPrestige    = Math.max(...ps.map(p => prestige[p]), 0.001);

  html += `
  <div class="card">
    <h2>⭐ Prestige Ranking</h2>
    <div class="concept-card">
      <h4>Not all wins are equal</h4>
      <p>Raw win count treats every opponent the same. <strong>Prestige ranking</strong>
         (inspired by PageRank) says: beating a strong player earns you more credit than
         beating a weak one. Your prestige score is the sum of your opponents' prestige scores,
         iterated until stable. This can flip the raw ranking — look for players who punch
         above their weight by beating tough opponents!</p>
    </div>
    <div class="rank-compare">
      <div>
        <p style="font-weight:700;margin-bottom:0.6rem;">Raw wins ranking</p>
        <ul class="rank-list">
          ${rawRanked.map((p,i) => `<li>
            <span class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</span>
            <span>${p}</span>
            <span style="margin-left:auto;color:var(--text-light);font-size:0.85rem;">${outDeg(month,p)}W</span>
          </li>`).join('')}
        </ul>
      </div>
      <div>
        <p style="font-weight:700;margin-bottom:0.6rem;">Prestige ranking</p>
        <ul class="rank-list">
          ${prestigeRanked.map((p,i) => {
            const rawPos = rawRanked.indexOf(p);
            const diff   = rawPos - i;
            const arrow  = diff > 0 ? `<span style="color:var(--secondary)">▲${diff}</span>`
                         : diff < 0 ? `<span style="color:var(--primary)">▼${Math.abs(diff)}</span>`
                         : `<span style="color:#ccc;">—</span>`;
            return `<li>
              <span class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</span>
              <span>${p}</span>
              <span style="margin-left:auto;font-size:0.82rem;">${arrow}</span>
            </li>`;
          }).join('')}
        </ul>
      </div>
    </div>
    <p style="font-size:0.8rem;color:var(--text-light);margin-top:0.5rem;">▲▼ shows movement vs raw wins ranking.</p>
  </div>`;

  // ── 9: Elo ────────────────────────────────────────────
  html += `
  <div class="card">
    <h2>📈 Elo Ratings Over Time</h2>
    <div class="concept-card">
      <h4>Skill tracking across months</h4>
      <p><strong>Elo</strong> is the rating system used in chess and many competitive games.
         After each matchup, the winner gains points and the loser loses points — but the
         amount exchanged depends on the expected result: upsetting a stronger player earns
         more than beating a weaker one. Starting at 1000, ratings drift up or down as the
         months accumulate, revealing long-term trends.</p>
    </div>
    <div class="elo-wrap" id="th-elo-chart"></div>
    <div class="elo-legend" id="th-elo-legend"></div>
  </div>`;

  sec.innerHTML = html;

  // Render main graph (colored by out-degree)
  const mainWrap = document.getElementById('th-graph-main');
  if (mainWrap) renderForceGraph(mainWrap, ps, es, p => winColor(outDeg(month,p), maxOut), month);

  // Elo chart
  const eloWrap = document.getElementById('th-elo-chart');
  const eloLeg  = document.getElementById('th-elo-legend');
  if (eloWrap) renderEloChart(eloWrap, eloLeg);

  // Render SCC graph (colored by component)
  const sccWrap = document.getElementById('th-graph-scc');
  if (sccWrap) renderForceGraph(sccWrap, ps, es, p => playerColor[p] || '#aaa', null);

  // Degree chart
  const dc = document.getElementById('th-degree-chart');
  if (dc) renderDegreeChart(dc, month, ps);

  // Hamiltonian path
  const hp = document.getElementById('th-ham-path');
  if (hp) {
    hp.innerHTML = ham.map((p, i) => `
      <div class="ham-node">
        <div class="ham-circle" style="background:${playerColor[p]||'#aaa'}">${p}</div>
        <div class="ham-rank">#${i+1}</div>
      </div>
      ${i < ham.length-1 ? '<span class="ham-arrow">→</span>' : ''}
    `).join('');
  }
}

function renderDegreeChart(container, month, players) {
  const outs = players.map(p => outDeg(month,p));
  const ins  = players.map(p => inDeg(month,p));
  const maxV = Math.max(...outs, ...ins, 1);
  const maxH = 120;

  container.innerHTML = `
    <div class="bar-chart">
      ${players.map((p,i) => `
        <div class="bar-group">
          <div class="bar-stack" style="height:${maxH}px;align-items:flex-end;">
            <div class="bar-out" style="height:${Math.round(outs[i]/maxV*maxH)}px;" title="${p}: ${outs[i]} wins"></div>
            <div class="bar-in"  style="height:${Math.round(ins[i]/maxV*maxH)}px;"  title="${p}: ${ins[i]} losses"></div>
          </div>
          <div class="bar-label">${p}</div>
        </div>
      `).join('')}
    </div>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="dot" style="background:var(--secondary)"></div> Wins (out-degree)</div>
      <div class="chart-legend-item"><div class="dot" style="background:var(--primary-light)"></div> Losses (in-degree)</div>
    </div>`;
}

function renderLeaderboard() {

  ms.forEach(m => {
    const w = monthWinner(m);
    if (w && stats[w]) stats[w].monthWins++;
    state.players.forEach(p => {
      stats[p].totalWins   += outDeg(m, p);
      stats[p].totalLosses += inDeg(m, p);

          ${sorted.map((p,i) => {

              <td>${trophy[i]||i+1}</td>

              <td>${s.totalWins}</td>

        </tbody>

    </div>

    <div class="card">
      <h2>📅 Month-by-Month Winners</h2>
      ${ms.length ? `
        <ul class="rank-list">
          ${ms.map((m,i) => {
            const w  = monthWinner(m);
            const e  = edges(m).length;
            const tp = state.players.length*(state.players.length-1)/2;
            return `<li>
              <span class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</span>
              <div>

                <div style="font-size:0.78rem;color:var(--text-light);">${e}/${tp} matchups</div>

            </li>`;
          }).join('')}
        </ul>
      ` : `<p style="color:var(--text-light)">No months recorded yet.</p>`}
    </div>

    <div class="card">
      <h2>⚔️ Head-to-Head (all time)</h2>
      ${state.players.length < 2 ? `<p style="color:var(--text-light)">Need at least 2 players.</p>` : `
        <div class="matrix-scroll">
          <table class="t-matrix">
            <tr><th class="player-label" style="background:#eee;">↓ vs →</th>
              ${state.players.map(p=>`<th class="player-label">${p}</th>`).join('')}
            </tr>
            ${state.players.map(row => `<tr>
              <th class="player-label">${row}</th>
              ${state.players.map(col => {
                if (row===col) return `<td class="self">—</td>`;
                const w = h2h[`${row}::${col}`]||0;
                const l = h2h[`${col}::${row}`]||0;
                const tot = w+l;
                const bg = tot===0 ? '#f5f5f5' : w>l ? '#c6efce' : w<l ? '#ffc7ce' : '#fff9c4';

}

function addPlayer() {
  const input = document.getElementById('new-player-input');
  const name  = input.value.trim();
  if (!name) return;
  if (state.players.includes(name)) { alert(`${name} is already in the game!`); return; }
  state.players.push(name);
  saveState();
  input.value = '';
  renderPlayers();
  document.getElementById('new-player-input').focus();
}

function removePlayer(name) {
  if (!confirm(`Remove ${name}? Their recorded matchups will also be removed.`)) return;
  state.players = state.players.filter(p => p !== name);
  Object.keys(state.months).forEach(m => {
    state.months[m].edges = state.months[m].edges.filter(e => e.from!==name && e.to!==name);
  });
  saveState();
  renderPlayers();
}

function resetAll() {
  if (!confirm('Reset ALL data? This cannot be undone.')) return;
  state = { players: [], months: {} };
  saveState();
  switchTab('home');
}

function exportData() {
  const json = JSON.stringify(state, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    showExportMsg('✓ Copied to clipboard! Paste it to a family member.', 'var(--secondary)');
  }).catch(() => {
    // Fallback: show in textarea for manual copy
    const area = document.getElementById('import-area');
    const txt  = document.getElementById('import-text');
    area.style.display = 'block';
    txt.value = json;
    txt.select();
    showExportMsg('Clipboard blocked — select all the text above and copy manually.', 'var(--primary)');
  });
}

function toggleImport(which) {
  // Hide both panels, then open the requested one
  document.getElementById('import-area').style.display = 'none';
  document.getElementById('merge-area').style.display  = 'none';
  hideExportMsg();
  if (which === 'import') {
    document.getElementById('import-area').style.display = 'block';
    const txt = document.getElementById('import-text');
    txt.value = ''; txt.focus();
  } else if (which === 'merge') {
    document.getElementById('merge-area').style.display = 'block';
    const txt = document.getElementById('merge-text');
    txt.value = ''; txt.focus();
  }
}

function importData() {
  const raw = document.getElementById('import-text').value.trim();
  try {
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed.players) || typeof parsed.months !== 'object') throw new Error();
    state = parsed;
    saveState();
    document.getElementById('import-area').style.display = 'none';
    showExportMsg('✓ Data loaded successfully!', 'var(--secondary)');
    renderPlayers();
  } catch(e) {
    showExportMsg('✗ Invalid data — make sure you pasted the full export.', 'var(--primary)');
  }
}

function showExportMsg(msg, color) {
  const el = document.getElementById('export-msg');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
  el.style.display = 'block';
}

function hideExportMsg() {
  const el = document.getElementById('export-msg');
  if (el) el.style.display = 'none';
}

// EXTRA GRAPH THEORY ALGORITHMS
// ═══════════════════════════════════════════════════════

function findCyclicTriples(players, es) {
  const edgeSet = new Set(es.map(e => `${e.from}::${e.to}`));
  const beats   = (a, b) => edgeSet.has(`${a}::${b}`);
  const triples = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i+1; j < players.length; j++)
      for (let k = j+1; k < players.length; k++) {
        const [a, b, c] = [players[i], players[j], players[k]];
        if (beats(a,b) && beats(b,c) && beats(c,a)) triples.push([a,b,c]);
        else if (beats(a,c) && beats(c,b) && beats(b,a)) triples.push([a,c,b]);
      }
  return triples;
}

function prestigeRank(players, es, iterations=80) {
  if (!players.length) return {};
  const n = players.length;
  // score[winner] accumulates the scores of everyone they beat (iterative eigenvector)
  let scores = {};
  players.forEach(p => scores[p] = 1 / n);
  for (let iter = 0; iter < iterations; iter++) {
    const next = {};
    players.forEach(p => next[p] = 0);
    es.forEach(e => { if (next[e.from] !== undefined) next[e.from] += scores[e.to]; });
    // Players with no wins get a floor so they don't disappear
    players.forEach(p => { if (next[p] === 0) next[p] = 0.0001; });
    const total = Object.values(next).reduce((s,v) => s+v, 0);
    players.forEach(p => scores[p] = next[p] / total);
  }
  return scores;
}

function computeElo(K=32, initial=1000) {
  // Returns { history: {month: {player: elo}}, final: {player: elo} }
  const elos = {};
  state.players.forEach(p => elos[p] = initial);
  const history = {};
  const sortedMonths = Object.keys(state.months).sort();
  sortedMonths.forEach(month => {
    edges(month).forEach(e => {
      const rW = elos[e.from] ?? initial;
      const rL = elos[e.to]   ?? initial;
      const eW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
      elos[e.from] = Math.round(rW + K * (1 - eW));
      elos[e.to]   = Math.round(rL + K * (0 - (1 - eW)));
    });
    history[month] = { ...elos };
  });
  return { history, final: elos };
}

function renderEloChart(container, legendEl) {
  const sortedMonths = Object.keys(state.months).sort();
  if (sortedMonths.length < 1 || !state.players.length) {
    container.innerHTML = `<p style="color:var(--text-light);padding:1rem;">Need at least one month of data.</p>`;
    return;
  }

  const { history, final } = computeElo();
  const colors = d3.schemeTableau10;
  const playerColor = {};
  state.players.forEach((p, i) => playerColor[p] = colors[i % colors.length]);

  // Build series: prepend a "start" point at initial=1000 before first month
  const allPoints = {}; // player → [{month, elo}]
  state.players.forEach(p => {
    allPoints[p] = [{ month: '__start__', elo: 1000 }];
    sortedMonths.forEach(m => {
      allPoints[p].push({ month: m, elo: (history[m] && history[m][p]) ?? 1000 });
    });
  });

  const xLabels   = ['Start', ...sortedMonths.map(fmtMonth)];
  const xIndices  = allPoints[state.players[0]].map((_, i) => i);
  const allElos   = state.players.flatMap(p => allPoints[p].map(d => d.elo));
  const eloMin    = Math.min(...allElos) - 30;
  const eloMax    = Math.max(...allElos) + 30;

  const rect = container.getBoundingClientRect();
  const W  = rect.width  || 680;
  const H  = rect.height || 300;
  const mg = { top: 15, right: 20, bottom: 50, left: 55 };
  const iW = W - mg.left - mg.right;
  const iH = H - mg.top  - mg.bottom;

  d3.select(container).selectAll('*').remove();
  const svg = d3.select(container).append('svg').attr('width', W).attr('height', H);
  const g   = svg.append('g').attr('transform', `translate(${mg.left},${mg.top})`);

  const xScale = d3.scalePoint().domain(xIndices).range([0, iW]);
  const yScale = d3.scaleLinear().domain([eloMin, eloMax]).range([iH, 0]);

  // Grid lines
  g.append('g').attr('class','grid')
    .call(d3.axisLeft(yScale).tickSize(-iW).tickFormat(''))
    .selectAll('line').attr('stroke','#eee');
  g.select('.grid .domain').remove();

  // Axes
  g.append('g').attr('transform',`translate(0,${iH})`)
    .call(d3.axisBottom(xScale).tickFormat(i => xLabels[i]))
    .selectAll('text')
    .attr('transform','rotate(-30)').attr('text-anchor','end')
    .attr('font-size','11px');
  g.append('g')
    .call(d3.axisLeft(yScale).ticks(5))
    .selectAll('text').attr('font-size','11px');

  // Y-axis label
  g.append('text').attr('transform','rotate(-90)')
    .attr('y',-42).attr('x',-iH/2)
    .attr('text-anchor','middle').attr('font-size','11px')
    .attr('fill','var(--text-light)').text('Elo Rating');

  // Lines and dots
  const line = d3.line()
    .x((_,i) => xScale(i))
    .y(d => yScale(d.elo));

  state.players.forEach(p => {
    const pts = allPoints[p];
    g.append('path')
      .datum(pts)
      .attr('class','elo-line')
      .attr('stroke', playerColor[p])
      .attr('d', line);

    g.selectAll(`.dot-${p.replace(/\W/g,'_')}`)
      .data(pts)
      .enter().append('circle')
      .attr('class','elo-dot')
      .attr('cx', (_,i) => xScale(i))
      .attr('cy', d => yScale(d.elo))
      .attr('r', 4)
      .attr('fill', playerColor[p])
      .attr('stroke','#fff').attr('stroke-width', 2)
      .on('mouseover', (ev, d) => showTip(ev, `<strong>${p}</strong><br>${d.month==='__start__'?'Start':fmtMonth(d.month)}: <strong>${d.elo}</strong>`))
      .on('mousemove', moveTip)
      .on('mouseout',  hideTip);
  });

  // Legend
  if (legendEl) {
    const byFinal = [...state.players].sort((a,b) => final[b] - final[a]);
    legendEl.innerHTML = byFinal.map(p =>
      `<div class="elo-legend-item">
        <div class="elo-legend-swatch" style="background:${playerColor[p]}"></div>
        ${p} <span style="color:var(--text-light);font-weight:400;">${final[p]}</span>
      </div>`
    ).join('');
  }
}

// ═══════════════════════════════════════════════════════
// MERGE
// ═══════════════════════════════════════════════════════

// Holds the pending merge data while the conflict modal is open
let _pendingMerge = null;

function startMerge() {
  const raw = document.getElementById('merge-text').value.trim();
  let incoming;
  try {
    incoming = JSON.parse(raw);
    if (!Array.isArray(incoming.players) || typeof incoming.months !== 'object') throw new Error();
  } catch(e) {
    showExportMsg('✗ Invalid data — make sure you pasted the full export.', 'var(--primary)');
    return;
  }

  const newPlayers = incoming.players.filter(p => !state.players.includes(p));
  const newEdges   = [];   // [{month, from, to}] — no conflict, safe to add
  const conflicts  = [];   // [{month, pair, currentWinner, incomingWinner}]

  // All players that will exist after merge (needed to validate edges)
  const allPlayers = new Set([...state.players, ...newPlayers]);

  Object.keys(incoming.months).forEach(month => {
    (incoming.months[month].edges || []).forEach(e => {
      if (!allPlayers.has(e.from) || !allPlayers.has(e.to)) return; // skip unknown
      const cur = edgeBetween(month, e.from, e.to);
      if (cur === null) {
        newEdges.push({ month, from: e.from, to: e.to });
      } else if (cur !== e.from) {
        // cur === e.to means: we say e.to won, they say e.from won
        conflicts.push({ month, playerA: e.from, playerB: e.to, currentWinner: cur, incomingWinner: e.from });
      }
      // if cur === e.from: both agree, nothing to do
    });
  });

  _pendingMerge = { newPlayers, newEdges, conflicts };

  if (!conflicts.length) {
    // Nothing to resolve — apply immediately
    applyMerge();
  } else {
    showConflictModal(newPlayers, newEdges, conflicts);
  }
}

function showConflictModal(newPlayers, newEdges, conflicts) {
  const subtitle = document.getElementById('merge-modal-subtitle');
  const body     = document.getElementById('merge-modal-body');

  const parts = [];
  if (newPlayers.length) parts.push(`${newPlayers.length} new player${newPlayers.length!==1?'s':''}`);
  if (newEdges.length)   parts.push(`${newEdges.length} new matchup${newEdges.length!==1?'s':''}`);
  subtitle.textContent = (parts.length ? `Auto-adding: ${parts.join(', ')}. ` : '') +
    `${conflicts.length} conflict${conflicts.length!==1?'s':''} need your decision:`;

  body.innerHTML = conflicts.map((c, i) => `
    <div class="conflict-item">
      <div class="conflict-header">${fmtMonth(c.month)}</div>
      <div class="conflict-pair" style="padding-top:0.5rem;">${c.playerA} vs ${c.playerB}</div>
      <div class="conflict-options">
        <label class="conflict-opt opt-mine">
          <input type="radio" name="conflict-${i}" value="current" checked>
          <span>🟢 <strong>${c.currentWinner}</strong> won <span style="color:var(--text-light);font-size:0.8rem;">(yours)</span></span>
        </label>
        <label class="conflict-opt opt-theirs">
          <input type="radio" name="conflict-${i}" value="incoming">
          <span>🔵 <strong>${c.incomingWinner}</strong> won <span style="color:var(--text-light);font-size:0.8rem;">(theirs)</span></span>
        </label>
      </div>
    </div>`).join('');

  document.getElementById('merge-overlay').style.display = 'block';
}

function applyMerge() {
  if (!_pendingMerge) return;
  const { newPlayers, newEdges, conflicts } = _pendingMerge;

  // Add new players
  newPlayers.forEach(p => { if (!state.players.includes(p)) state.players.push(p); });

  // Add unambiguous new edges
  newEdges.forEach(e => setEdge(e.month, e.from, e.to));

  // Apply conflict choices
  conflicts.forEach((c, i) => {
    const radios = document.querySelectorAll(`input[name="conflict-${i}"]`);
    const choice = [...radios].find(r => r.checked)?.value || 'current';
    if (choice === 'incoming') {
      const loser = c.incomingWinner === c.playerA ? c.playerB : c.playerA;
      setEdge(c.month, c.incomingWinner, loser);
    }
    // 'current' → keep existing edge, no change needed
  });

  saveState();
  closeMergeModal();
  toggleImport(null);

  const added = newPlayers.length + newEdges.length + conflicts.length;
  showExportMsg(`✓ Merge complete — ${added} item${added!==1?'s':''} processed.`, 'var(--secondary)');
  renderPlayers();
}

function closeMergeModal() {
  document.getElementById('merge-overlay').style.display = 'none';
  _pendingMerge = null;
}

// Close modal on overlay click
document.getElementById('merge-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeMergeModal();
});
